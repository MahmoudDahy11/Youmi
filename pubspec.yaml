name: youmi
description: A personal offline-first desktop productivity application.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.2.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_bloc: ^8.1.3
  flutter_svg: ^2.0.10+1
  go_router: ^13.0.0
  get_it: ^7.6.4
  isar: ^3.1.0+1
  isar_flutter_libs: ^3.1.0+1
  flutter_local_notifications: ^17.0.0
  flutter_markdown: ^0.7.1
  path_provider: ^2.1.2
  intl: ^0.18.1
  timezone: ^0.9.4
  flutter_highlight: ^0.7.0
  markdown: ^7.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  isar_generator: ^3.1.0+1
  build_runner: ^2.4.7

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/images/app_icons/
